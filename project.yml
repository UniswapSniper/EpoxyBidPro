name: EpoxyBidPro
options:
  bundleIdPrefix: com.epoxyBidPro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

targets:
  EpoxyBidPro:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS/EpoxyBidPro
        createIntermediateGroups: true
    resources:
      - path: iOS/EpoxyBidPro/Resources
        createIntermediateGroups: true
      - path: iOS/EpoxyBidPro/Resources/Assets.xcassets
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.epoxyBidPro.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "HR82BNYZHV"
        INFOPLIST_FILE: iOS/EpoxyBidPro/Info.plist
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # CFBundleIconName in base settings for some xcodegen versions
        CFBundleIconName: AppIcon
        # Privacy descriptions for LiDAR / camera
        INFOPLIST_KEY_NSCameraUsageDescription: "EpoxyBidPro needs camera access to measure floor areas using AR technology."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "EpoxyBidPro uses your location to pre-fill job site addresses."
    dependencies:
      - sdk: ARKit.framework
        weak: false
      - sdk: RealityKit.framework
        weak: true
      - sdk: RoomPlan.framework
        weak: true
    info:
      path: iOS/EpoxyBidPro/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        NSCameraUsageDescription: "EpoxyBidPro needs camera access to measure floor areas automatically using RoomPlan."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon

schemes:
  EpoxyBidPro:
    build:
      targets:
        EpoxyBidPro: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
